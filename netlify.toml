[build]
  publish = "."

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/visuals/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Cache potenzial-check assets
[[headers]]
  for = "/potenzial-check/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Custom 404
[[redirects]]
  from = "/partner"
  to = "/partner.html"
  status = 200

[[redirects]]
  from = "/schnell-check"
  to = "/schnell-check.html"
  status = 200

[[redirects]]
  from = "/ki-check"
  to = "/potenzial-check/"
  status = 301

[[redirects]]
  from = "/check"
  to = "/potenzial-check/"
  status = 301

[[redirects]]
  from = "/appetizer"
  to = "/potenzial-check/"
  status = 301

[[redirects]]
  from = "/appetizer/*"
  to = "/potenzial-check/:splat"
  status = 301
