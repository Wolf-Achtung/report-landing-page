    <path d="M40 5 L75 20 L75 45 C75 65 60 80 40 90 C20 80 5 65 5 45 L5 20 Z" fill="rgba(74,140,196,0.1)"/>
    <polyline points="22 45 35 58 58 35" stroke="#059669" stroke-width="3"/>
